name: Generate Race Results

on:
  push:
    paths:
      - 'results/**.json'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Run parser
        run: python3 parse_results.py

      - name: Commit generated races.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/data/races.json
          git diff --staged --quiet || git commit -m "Update race results" && git push
